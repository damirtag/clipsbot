name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags="-s -w" -o mellclipsbot ./cmd/bot

      - name: Copy binary
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          port: 2222
          key: ${{ secrets.VPS_KEY }}
          source: "mellclipsbot"
          target: "/opt/mellclipsbot"

      - name: Copy migrations
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          port: 2222
          key: ${{ secrets.VPS_KEY }}
          source: "internal/repository/postgres/migrations"
          target: "/opt/mellclipsbot"
          strip_components: 3   # drops internal/repository/postgres/, leaves .../migrations/*

      - name: Run migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          port: 2222
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -a
            source /opt/mellclipsbot/.env
            set +a
            command -v migrate || curl -L https://github.com/golang-migrate/migrate/releases/latest/download/migrate.linux-amd64.tar.gz | tar xz -C /usr/local/bin migrate
            migrate -path /opt/mellclipsbot/migrations -database "$DATABASE_URL" up

      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          port: 2222
          key: ${{ secrets.VPS_KEY }}
          script: |
            systemctl restart mellclipsbot
            systemctl status mellclipsbot --no-pager